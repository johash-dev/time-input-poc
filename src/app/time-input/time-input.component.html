<div class="time-input-root">
  <div
    class="time-field"
    [class.time-field--invalid]="!!effectiveErrorMessage"
    [class.time-field--disabled]="isDisabled"
    [class.time-field--fluid]="isFluidWidth"
  >
    <button
      type="button"
      class="time-field__iconBtn"
      (click)="togglePicker()"
      [disabled]="isDisabled"
      aria-label="Open time picker"
    >
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path
          fill="currentColor"
          d="M12 1.75A10.25 10.25 0 1 0 22.25 12 10.262 10.262 0 0 0 12 1.75Zm0 18.5A8.25 8.25 0 1 1 20.25 12 8.259 8.259 0 0 1 12 20.25Zm.75-13a.75.75 0 0 0-1.5 0v5c0 .2.08.39.22.53l3 3a.75.75 0 1 0 1.06-1.06l-2.78-2.78Z"
        />
      </svg>
    </button>

    <div class="time-field__content" (click)="textInput.focus()">
      <div class="time-field__label">
        <span *ngIf="label">{{ label }}</span>
        <span *ngIf="(required && showRedAsterisk) || requiredAsterisk" class="time-field__asterisk">*</span>
      </div>

      <input
        #textInput
        type="text"
        class="time-field__input"
        [disabled]="isDisabled"
        [attr.placeholder]="placeholder || 'Select'"
        [value]="displayValue"
        (input)="displayValue = ($any($event.target).value ?? '')"
        (blur)="onInputBlur()"
        (keydown)="onInputKeydown($event)"
      />
    </div>
  </div>

  <div *ngIf="effectiveErrorMessage" class="time-field__error">
    {{ effectiveErrorMessage }}
  </div>

  <div
    *ngIf="isPickerOpen"
    class="time-picker-panel"
    [class.time-picker-panel--fluid]="isFluidWidth"
    role="dialog"
    aria-label="Time picker"
  >
    <div class="time-picker-columns">
      <div class="time-col">
        <div class="time-col__list">
          <button
            type="button"
            class="time-col__item"
            *ngFor="let h of pickerHours"
            [class.is-selected]="h === pickerHour12"
            [disabled]="isPickerHourDisabled(h)"
            (click)="selectPickerHour(h)"
          >
            {{ pad2(h) }}
          </button>
        </div>
      </div>

      <div class="time-col">
        <div class="time-col__list">
          <button
            type="button"
            class="time-col__item"
            *ngFor="let m of pickerMinutes"
            [class.is-selected]="m === pickerMinute"
            [disabled]="isPickerMinuteDisabled(m)"
            (click)="selectPickerMinute(m)"
          >
            {{ pad2(m) }}
          </button>
        </div>
      </div>

      <div class="time-col">
        <div class="time-col__list">
          <button
            type="button"
            class="time-col__item"
            *ngFor="let mer of pickerMeridians"
            [class.is-selected]="mer === pickerMeridian"
            [disabled]="isPickerMeridianDisabled(mer)"
            (click)="selectPickerMeridian(mer)"
          >
            {{ mer }}
          </button>
        </div>
      </div>
    </div>

    <div class="time-picker-footer">
      <button *ngIf="showCancel" type="button" class="btn-cancel" (click)="onCancelPicker()">CANCEL</button>
      <button type="button" class="btn-ok" (click)="isPickerOpen = false">Ok</button>
    </div>
  </div>
</div>
